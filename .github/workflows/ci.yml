name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build
      - run: cargo test
      - run: cargo clippy -- -D warnings

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Check coverage
        run: |
          cargo llvm-cov --all-features --json --output-path coverage.json
          cargo llvm-cov report
          COVERAGE=$(cat coverage.json | python3 -c "import sys,json; d=json.load(sys.stdin); t=d['data'][0]['totals']['lines']; print(f\"{t['percent']:.1f}\")")
          echo "Line coverage: ${COVERAGE}%"
          python3 -c "assert float('${COVERAGE}') >= 75.0, f'Coverage {${COVERAGE}}% is below 75% threshold'"
